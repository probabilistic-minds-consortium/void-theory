// ---- 3D positions: organic, asymmetric layout ----
// Instead of rigid octagonal rings, place cells in a flowing organic form
// Use feature index as angular position, threshold as depth/spread

function cellPos3D(cell, idx) {
  // Base angle from feature, with organic offset
  const angle = (cell.fr / 8) * Math.PI * 2 - Math.PI * 0.4;
  const thrIdx = thresholds.indexOf(cell.thr);
  // Spiral outward with threshold
  const r = 1.8 + thrIdx * 1.1 + cell.acc * 0.8;
  // Y position: accuracy pushes upward, low-acc sinks
  const y = (cell.acc - 0.7) * 5.0 + (thrIdx - 1.5) * 0.8;
  const x = Math.cos(angle) * r + Math.sin(idx * 1.7) * 0.5;
  const z = Math.sin(angle) * r + Math.cos(idx * 2.3) * 0.5;
  return [x, y, z];
}

cells.forEach((c,i) => { c.pos = cellPos3D(c,i); });

  return {r:200, g:130, b:130}; // rose

  const u = 1-t;
  return [

    u*u*u*p0[2] + 3*u*u*t*p1[2] + 3*u*t*t*p2[2] + t*t*t*p3[2]

      const alpha = (0.05 + RNG()*0.12) * fadeout;
      filaments.push({pos, size, alpha, cr:col.r, cg:col.g, cb:col.b,
        phase:RNG()*6.28, speed:0.004+RNG()*0.012});
    }
  }
});

// ---- Camera ----
let rotY = 0.6, rotX = 0.2;
let zoom = 1.15;
let autoRotate = true;
let dragging = false, lastMx=0, lastMy=0;

cv.addEventListener('mousedown', e=>{dragging=true;lastMx=e.clientX;lastMy=e.clientY;autoRotate=false;});
addEventListener('mouseup', ()=>{dragging=false;});
addEventListener('mousemove', e=>{
  if(dragging){rotY+=(e.clientX-lastMx)*0.005;rotX+=(e.clientY-lastMy)*0.005;
  rotX=Math.max(-1.2,Math.min(1.2,rotX));lastMx=e.clientX;lastMy=e.clientY;}
});
cv.addEventListener('wheel', e=>{e.preventDefault();zoom*=e.deltaY>0?0.95:1.05;zoom=Math.max(0.3,Math.min(3,zoom));},{passive:false});
cv.addEventListener('dblclick', ()=>{autoRotate=true;});

// Touch
let lastTD=0;
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lastMx=e.touches[0].clientX;lastMy=e.touches[0].clientY;autoRotate=false;}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTD=Math.sqrt(dx*dx+dy*dy);}e.preventDefault();},{passive:false});
cv.addEventListener('touchmove',e=>{if(e.touches.length===1&&dragging){rotY+=(e.touches[0].clientX-lastMx)*0.005;rotX+=(e.touches[0].clientY-lastMy)*0.005;rotX=Math.max(-1.2,Math.min(1.2,rotX));lastMx=e.touches[0].clientX;lastMy=e.touches[0].clientY;}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);if(lastTD>0){zoom*=d/lastTD;zoom=Math.max(0.3,Math.min(3,zoom));}lastTD=d;}e.preventDefault();},{passive:false});
cv.addEventListener('touchend',()=>{dragging=false;lastTD=0;});

// ---- Projection ----
function project(p){
  let [x,y,z]=p;
  let cY=Math.cos(rotY),sY=Math.sin(rotY);
  let x1=x*cY-z*sY, z1=x*sY+z*cY;
  let cX=Math.cos(rotX),sX=Math.sin(rotX);
  let y1=y*cX-z1*sX, z2=y*sX+z1*cX;
  const fov=7;
  const sc=fov/(fov+z2)*Math.min(W,H)*0.09*zoom;
  return [W/2+x1*sc, H/2+y1*sc, z2, sc];
}

// ---- Mouse hover ----
let mx=-9999,my=-9999,hovered=null;
cv.addEventListener('mousemove',e=>{if(!dragging){mx=e.clientX;my=e.clientY;}});

function showPanel(c){
  const p=document.getElementById('panel');p.classList.add('visible');
  document.getElementById('pt').textContent=`Cell ${c.id} · ${c.group}`;
  document.getElementById('pf').textContent=c.fn;
  document.getElementById('ph').textContent=`${c.thr}/${c.w_denom}`;
  document.getElementById('pp').textContent=c.group==='NEG'?'high \u2192 malignant':'high \u2192 benign';
  document.getElementById('pa').textContent=`${c.amplitude_n}/${c.amplitude_d}`;
  document.getElementById('pab').style.width=(c.amp*100)+'%';
  document.getElementById('pab').style.background='rgba(220,180,140,0.6)';
  const ap=c.acc*100;
  document.getElementById('pc').textContent=`${c.accuracy_n}/${c.accuracy_d} (${Math.round(ap*10)/10}%)`;
  document.getElementById('pcb').style.width=ap+'%';
  const col=cellColor(c.acc,c.amp);
  document.getElementById('pcb').style.background=`rgb(${col.r},${col.g},${col.b})`;
  document.getElementById('pb').textContent=c.budget.toLocaleString();
  document.getElementById('pe').textContent=c.heat.toLocaleString();
  document.getElementById('ps').textContent=`${c.correct} / ${c.wrong}`;
}

// ---- Labels as visual texture (glitchy monospace) ----
const labelData = cells.map(c => ({
  pos: [c.pos[0]+(RNG()-0.5)*0.8, c.pos[1]-0.5-RNG()*0.5, c.pos[2]+(RNG()-0.5)*0.8],
  text: c.fn.substring(0,12).toUpperCase(),
  acc: c.acc, phase: RNG()*6.28
}));

// ---- Main render ----
let t=0;
function frame(){
  t++;
  if(autoRotate) rotY+=0.002;
  cx.clearRect(0,0,W,H);

  // Pure black background
  cx.fillStyle='#000';
  cx.fillRect(0,0,W,H);

  // Collect all renderable items
  const items = [];

  // Dust
  dust.forEach(d => {
    const anim = Math.sin(t*d.speed+d.phase)*0.02;
    const pos=[d.pos[0]+anim,d.pos[1]+Math.cos(t*d.speed*0.7+d.phase)*0.015,d.pos[2]];
    const [sx,sy,sz,sc]=project(pos);
    items.push({z:sz, draw:()=>{
      const depthF=Math.max(0.1,Math.min(1,(4-sz)/8));
      const r=Math.max(0.2,d.size*sc*0.06);
      cx.fillStyle=`rgba(${d.cr},${d.cg},${d.cb},${d.alpha*depthF})`;
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
    }});
  });

  // Fibers
  fibers.forEach(f => {
    const anim=Math.sin(t*f.speed+f.phase);
    const pos=[f.pos[0]+anim*0.02,f.pos[1]+Math.cos(t*f.speed*0.8+f.phase)*0.015,f.pos[2]+Math.sin(t*f.speed*1.2+f.phase)*0.02];
    const [sx,sy,sz,sc]=project(pos);
    items.push({z:sz, draw:()=>{
      const depthF=Math.max(0.1,Math.min(1,(4-sz)/8));
      const r=Math.max(0.2,f.size*sc*0.07);
      cx.fillStyle=`rgba(${f.cr},${f.cg},${f.cb},${f.alpha*depthF*(0.7+anim*0.3)})`;
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
    }});
  });

  // Filaments
  filaments.forEach(f => {
    const anim=Math.sin(t*f.speed+f.phase);
    const pos=[f.pos[0]+anim*0.03,f.pos[1]+Math.cos(t*f.speed*0.6+f.phase)*0.02,f.pos[2]];
    const [sx,sy,sz,sc]=project(pos);
    items.push({z:sz, draw:()=>{
      const depthF=Math.max(0.1,Math.min(1,(4-sz)/8));
      const r=Math.max(0.2,f.size*sc*0.07);
      cx.fillStyle=`rgba(${f.cr},${f.cg},${f.cb},${f.alpha*depthF})`;
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
    }});
  });

  // Halos (including bokeh)
  halos.forEach(h => {
    const anim=Math.sin(t*h.speed+h.phase);
    const pos=[h.pos[0]+anim*0.02,h.pos[1]+Math.cos(t*h.speed*0.9+h.phase)*0.02,h.pos[2]+Math.sin(t*h.speed*1.1+h.phase)*0.02];
    const [sx,sy,sz,sc]=project(pos);
    items.push({z:sz, draw:()=>{
      const depthF=Math.max(0.1,Math.min(1,(4-sz)/8));
      const r=Math.max(0.3,h.size*sc*0.08);
      if(h.isBokeh){
        // Large soft bokeh circle — stroke only, transparent
        cx.strokeStyle=`rgba(${h.cr},${h.cg},${h.cb},${h.alpha*depthF*(0.6+anim*0.4)})`;
        cx.lineWidth=0.8+depthF*0.5;
        cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.stroke();
        // Very faint fill
        cx.fillStyle=`rgba(${h.cr},${h.cg},${h.cb},${h.alpha*depthF*0.15})`;
        cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
      } else {
        cx.fillStyle=`rgba(${h.cr},${h.cg},${h.cb},${h.alpha*depthF})`;
        cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
      }
    }});
  });

  // Cell cores — the main orbs
  cells.forEach(c => {
    const [sx,sy,sz,sc]=project(c.pos);
    items.push({z:sz, draw:()=>{
      const col=cellColor(c.acc,c.amp);
      const isHov=hovered===c;
      const breath=Math.sin(t*0.01+c.id*0.8)*2;
      const r=6+c.amp*18+breath;

      // Massive soft glow
      const glowR=r*(isHov?7:5);
      const glow=cx.createRadialGradient(sx,sy,r*0.15,sx,sy,glowR);
      glow.addColorStop(0,`rgba(${col.r},${col.g},${col.b},${isHov?0.3:0.18})`);
      glow.addColorStop(0.25,`rgba(${col.r},${col.g},${col.b},${isHov?0.12:0.06})`);
      glow.addColorStop(0.6,`rgba(${col.r},${col.g},${col.b},${isHov?0.03:0.015})`);
      glow.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=glow;
      cx.beginPath();cx.arc(sx,sy,glowR,0,Math.PI*2);cx.fill();

      // Core sphere with gradient
      const core=cx.createRadialGradient(sx-r*0.3,sy-r*0.3,0,sx,sy,r);
      core.addColorStop(0,`rgba(${Math.min(255,col.r+60)},${Math.min(255,col.g+60)},${Math.min(255,col.b+60)},0.95)`);
      core.addColorStop(0.5,`rgba(${col.r},${col.g},${col.b},0.8)`);
      core.addColorStop(1,`rgba(${Math.round(col.r*0.5)},${Math.round(col.g*0.5)},${Math.round(col.b*0.5)},0.4)`);
      cx.fillStyle=core;
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();

      // Specular
      const hl=cx.createRadialGradient(sx-r*0.35,sy-r*0.4,0,sx,sy,r*0.7);
      hl.addColorStop(0,'rgba(255,255,255,0.4)');
      hl.addColorStop(0.5,'rgba(255,255,255,0.05)');
      hl.addColorStop(1,'rgba(255,255,255,0)');
      cx.fillStyle=hl;
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();

      // Hover info
      if(isHov){
        cx.font='10px "SF Mono",monospace';
        cx.fillStyle='rgba(240,230,220,0.85)';
        cx.textAlign='center';
        cx.fillText(`${Math.round(c.acc*1000)}‰`,sx,sy-r-10);
        cx.fillStyle='rgba(240,230,220,0.4)';
        cx.font='9px "SF Mono",monospace';
        cx.fillText(c.fn,sx,sy-r-22);
      }
    }});
  });

  // Labels (as visual texture, slightly glitchy)
  labelData.forEach(lb => {
    const [sx,sy,sz]=project(lb.pos);
    items.push({z:sz, draw:()=>{
      const depthF=Math.max(0,Math.min(1,(3-sz)/6));
      if(depthF<0.05) return;
      const glitch=Math.sin(t*0.03+lb.phase)>0.85;
      cx.font='8px "SF Mono",monospace';
      cx.fillStyle=`rgba(200,190,180,${depthF*(glitch?0.25:0.08)})`;
      cx.textAlign='left';
      cx.fillText(lb.text,sx,sy);
      // Border box like in reference images
      const tw=cx.measureText(lb.text).width;
      cx.strokeStyle=`rgba(200,190,180,${depthF*(glitch?0.2:0.04)})`;
      cx.lineWidth=0.5;
      cx.strokeRect(sx-3,sy-9,tw+6,12);
      // Thin leader line downward
      cx.beginPath();
      cx.moveTo(sx+tw/2,sy+3);
      cx.lineTo(sx+tw/2,sy+8+RNG()*6);
      cx.stroke();
    }});
  });

  // Sort all items by depth
  items.sort((a,b) => b.z - a.z);

  // Hit test
  hovered=null;
  cells.forEach(c=>{
    const [sx,sy]=project(c.pos);
    const r=8+c.amp*18;
    const dx=sx-mx,dy=sy-my;
    if(dx*dx+dy*dy<(r+12)*(r+12)) hovered=c;
  });

  // Draw all
  items.forEach(item => item.draw());

  // Panel
  if(hovered) showPanel(hovered);
  else document.getElementById('panel').classList.remove('visible');

  requestAnimationFrame(frame);
}

// Stats
const nA=cells.length;
const ap=Math.round(DATA.accuracy_n*1000/DATA.accuracy_d);
document.getElementById('stats').innerHTML=
  `<span>${nA}</span> surviving cells · accuracy <span>${ap}‰</span> · Wisconsin Breast Cancer (n=569)`;

frame();
</script>
</body>
</html>
