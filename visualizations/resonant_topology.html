const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H, dpr;
function resize(){
  dpr = devicePixelRatio;
  W = innerWidth; H = innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize', resize); resize();

// ---- Process cells ----
const fn = DATA.feature_names, mi = DATA.mi_ranking, tf = mi.slice(0,8);
const thresholds = [3,6,10,13];

const cells = DATA.cells.map(c => {
  let wf=-1, thr=0;
  for(let i=0;i<c.w_against_n.length;i++) if(c.w_against_n[i]>0){wf=i;thr=c.w_for_n[i];break;}
  const fr = tf.indexOf(wf);
  return {...c, wf, fr, thr, fn: fn[wf]||'?',
    amp: c.amplitude_n/c.amplitude_d,
    acc: c.accuracy_n/Math.max(1,c.accuracy_d)};
});

// ---- 3D geometry ----
const layerSpacing = 1.8;
const ringRadius = 3.5;

function cellPos3D(cell) {
  const layerIdx = thresholds.indexOf(cell.thr);
  const y = (layerIdx - 1.5) * layerSpacing;
  const angle = (cell.fr / 8) * Math.PI * 2 - Math.PI / 2;
  const x = Math.cos(angle) * ringRadius;
  const z = Math.sin(angle) * ringRadius;
  return [x, y, z];
}

cells.forEach(c => { c.pos = cellPos3D(c); });

// ---- Generate particle mesh ----
// Particles along edges, around nodes, and as ambient dust
const RNG = (function(s){return function(){s=s*16807%2147483647;return(s-1)/2147483646;}})(42);

const particles = [];

// Edge particles: along vertical and horizontal connections
function lerp3(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }

// Get NEG cell positions for edge generation
const negCells = cells.filter(c => c.group === 'NEG');

// Vertical edge particles
for(let fi=0; fi<8; fi++){
  for(let ti=0; ti<3; ti++){
    const a = negCells.find(c => c.fr===fi && c.thr===thresholds[ti]);
    const b = negCells.find(c => c.fr===fi && c.thr===thresholds[ti+1]);
    if(a && b){
      const bothAlive = a.influential && b.influential;
      const count = bothAlive ? 18 : 5;
      for(let i=0; i<count; i++){
        const t = (i+0.5)/count + (RNG()-0.5)*0.06;
        const pos = lerp3(a.pos, b.pos, t);
        // Offset perpendicular to edge
        const jitter = bothAlive ? 0.15 : 0.08;
        pos[0] += (RNG()-0.5)*jitter;
        pos[1] += (RNG()-0.5)*jitter*0.3;
        pos[2] += (RNG()-0.5)*jitter;
        const size = bothAlive ? 0.6 + RNG()*1.2 : 0.3 + RNG()*0.5;
        const alpha = bothAlive ? 0.15 + RNG()*0.35 : 0.05 + RNG()*0.1;
        particles.push({pos, size, alpha, type:'edge', alive:bothAlive, phase:RNG()*6.28, speed:0.005+RNG()*0.015});
      }
    }
  }
}

// Horizontal ring particles
for(let ti=0; ti<4; ti++){
  for(let fi=0; fi<8; fi++){
    const fi2 = (fi+1)%8;
    const a = negCells.find(c => c.fr===fi && c.thr===thresholds[ti]);
    const b = negCells.find(c => c.fr===fi2 && c.thr===thresholds[ti]);
    if(a && b){
      const bothAlive = a.influential && b.influential;
      const count = bothAlive ? 14 : 4;
      for(let i=0; i<count; i++){
        const t = (i+0.5)/count + (RNG()-0.5)*0.08;
        const pos = lerp3(a.pos, b.pos, t);
        const jitter = bothAlive ? 0.12 : 0.06;
        pos[0] += (RNG()-0.5)*jitter;
        pos[1] += (RNG()-0.5)*jitter;
        pos[2] += (RNG()-0.5)*jitter;
        const size = bothAlive ? 0.5 + RNG()*1.0 : 0.2 + RNG()*0.4;
        const alpha = bothAlive ? 0.12 + RNG()*0.3 : 0.04 + RNG()*0.08;
        particles.push({pos, size, alpha, type:'edge', alive:bothAlive, phase:RNG()*6.28, speed:0.004+RNG()*0.012});
      }
    }
  }
}

// Node halo particles: cluster around influential cells
cells.forEach(c => {
  if(!c.influential) return;
  const count = 25 + Math.floor(c.amp * 30);
  for(let i=0; i<count; i++){
    // Spherical distribution
    const theta = RNG() * Math.PI * 2;
    const phi = Math.acos(2*RNG()-1);
    const r = 0.25 + RNG()*0.8 * (0.5 + c.amp*0.5);
    const pos = [
      c.pos[0] + Math.sin(phi)*Math.cos(theta)*r,
      c.pos[1] + Math.sin(phi)*Math.sin(theta)*r*0.6,
      c.pos[2] + Math.cos(phi)*r
    ];
    const size = 0.4 + RNG()*1.5 * c.amp;
    const alpha = 0.08 + RNG()*0.25 * c.amp;
    particles.push({pos, size, alpha, type:'halo', cellId:c.id, acc:c.acc, amp:c.amp, phase:RNG()*6.28, speed:0.008+RNG()*0.02});
  }
});

// Ambient dust: floating particles forming the overall topology shape
for(let i=0; i<300; i++){
  // Distribute around the toroidal structure
  const angle = RNG() * Math.PI * 2;
  const layerT = RNG();
  const layerY = (layerT - 0.5) * layerSpacing * 4;
  const rVar = ringRadius * (0.3 + RNG() * 1.4);
  const pos = [
    Math.cos(angle) * rVar + (RNG()-0.5)*1.5,
    layerY + (RNG()-0.5)*1.2,
    Math.sin(angle) * rVar + (RNG()-0.5)*1.5
  ];
  const size = 0.2 + RNG()*0.8;
  const alpha = 0.02 + RNG()*0.06;
  particles.push({pos, size, alpha, type:'dust', phase:RNG()*6.28, speed:0.002+RNG()*0.008});
}

// ---- Camera ----
let rotY = 0.3, rotX = 0.35;
let zoom = 1.0;
let autoRotate = true;
let dragging = false, lastMx = 0, lastMy = 0;

cv.addEventListener('mousedown', e => { dragging=true; lastMx=e.clientX; lastMy=e.clientY; autoRotate=false; });
addEventListener('mouseup', () => { dragging=false; });
addEventListener('mousemove', e => {
  if(dragging){
    rotY += (e.clientX-lastMx)*0.005;
    rotX += (e.clientY-lastMy)*0.005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    lastMx=e.clientX; lastMy=e.clientY;
  }
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(0.3, Math.min(3, zoom));
}, {passive:false});
cv.addEventListener('dblclick', () => { autoRotate = true; });

// Touch support
let lastTouchDist = 0;
cv.addEventListener('touchstart', e => {
  if(e.touches.length===1){dragging=true;lastMx=e.touches[0].clientX;lastMy=e.touches[0].clientY;autoRotate=false;}
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy);}
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove', e => {
  if(e.touches.length===1&&dragging){
    rotY+=(e.touches[0].clientX-lastMx)*0.005;
    rotX+=(e.touches[0].clientY-lastMy)*0.005;
    rotX=Math.max(-1.2,Math.min(1.2,rotX));
    lastMx=e.touches[0].clientX;lastMy=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0){zoom*=d/lastTouchDist;zoom=Math.max(0.3,Math.min(3,zoom));}
    lastTouchDist=d;
  }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchend', () => {dragging=false;lastTouchDist=0;});

// ---- Project 3D → 2D ----
function project(p) {
  let [x,y,z] = p;
  let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 = x*cosY - z*sinY, z1 = x*sinY + z*cosY;
  let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let y1 = y*cosX - z1*sinX, z2 = y*sinX + z1*cosX;
  const fov = 8;
  const scale = fov / (fov + z2) * Math.min(W,H) * 0.1 * zoom;
  return [W/2 + x1*scale, H/2 + y1*scale, z2, scale];
}

// ---- Colors ----
function accCol(a){return a>=.95?'#50e8b0':a>=.85?'#64c8ff':a>=.7?'#e8c840':'#e06040'}
function accRGB(a){return a>=.95?[80,232,176]:a>=.85?[100,200,255]:a>=.7?[232,200,64]:[224,96,64]}

// ---- Hover ----
let mx=-9999, my=-9999, hovered=null;
cv.addEventListener('mousemove', e => { if(!dragging){mx=e.clientX; my=e.clientY;} });

function showPanel(c){
  const p = document.getElementById('panel');
  p.classList.add('visible');
  document.getElementById('pt').textContent = `Cell ${c.id} · ${c.group}`;
  document.getElementById('pf').textContent = c.fn;
  document.getElementById('ph').textContent = `${c.thr}/${c.w_denom}`;
  document.getElementById('pp').textContent = c.group==='NEG'?'high \u2192 malignant':'high \u2192 benign';
  document.getElementById('pa').textContent = `${c.amplitude_n}/${c.amplitude_d}`;
  document.getElementById('pab').style.width = (c.amp*100)+'%';
  document.getElementById('pab').style.background = '#64c8ff';
  const ap = c.acc*100;
  document.getElementById('pc').textContent = `${c.accuracy_n}/${c.accuracy_d} (${Math.round(ap*10)/10}%)`;
  document.getElementById('pcb').style.width = ap+'%';
  document.getElementById('pcb').style.background = accCol(c.acc);
  document.getElementById('pb').textContent = c.budget.toLocaleString();
  document.getElementById('pe').textContent = c.heat.toLocaleString();
  document.getElementById('ps').textContent = `${c.correct} / ${c.wrong}`;
}

// ---- Draw ----
let t = 0;
function frame(){
  t++;
  if(autoRotate) rotY += 0.003;
  cx.clearRect(0,0,W,H);

  // Background gradient
  const bg = cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#080a14'); bg.addColorStop(1,'#020306');
  cx.fillStyle = bg; cx.fillRect(0,0,W,H);

  // ---- Project particles ----
  const projParticles = particles.map(p => {
    // Animate particles slightly
    const anim = Math.sin(t * p.speed + p.phase);
    const pos = [
      p.pos[0] + anim * 0.03,
      p.pos[1] + Math.cos(t * p.speed * 0.7 + p.phase) * 0.02,
      p.pos[2] + Math.sin(t * p.speed * 1.3 + p.phase + 1) * 0.03
    ];
    const [sx,sy,sz,sc] = project(pos);
    return {p, sx, sy, sz, sc};
  });

  // Project all cells
  const projected = cells.map(c => {
    const [sx,sy,sz,sc] = project(c.pos);
    return {c, sx, sy, sz, sc};
  });

  // Merge particles and cells for depth sorting
  const allItems = [];
  projParticles.forEach(pp => allItems.push({type:'particle', data:pp, z:pp.sz}));
  projected.forEach(pc => allItems.push({type:'cell', data:pc, z:pc.sz}));
  allItems.sort((a,b) => b.z - a.z);

  // ---- Hit test on cells ----
  hovered = null;
  for(let i=projected.length-1; i>=0; i--){
    const p = projected[i];
    const r = p.c.influential ? 8 + p.c.amp * 18 : 4;
    const dx = p.sx - mx, dy = p.sy - my;
    if(dx*dx + dy*dy < (r+10)*(r+10)){ hovered = p.c; break; }
  }

  // ---- Draw all items depth-sorted ----
  allItems.forEach(item => {
    if(item.type === 'particle'){
      const {p: part, sx, sy, sz, sc} = item.data;
      // Depth-based fade
      const depthFade = Math.max(0.15, Math.min(1, (5 - sz) / 10));
      const anim = Math.sin(t * part.speed + part.phase);
      const animAlpha = part.alpha * (0.7 + 0.3 * anim);
      const finalAlpha = animAlpha * depthFade;
      const r = part.size * sc * 0.08;

      if(part.type === 'halo'){
        // Colored particles near nodes
        const [cr,cg,cb] = accRGB(part.acc);
        const brightMul = 0.5 + part.amp * 0.5;
        cx.fillStyle = `rgba(${Math.round(cr*brightMul)},${Math.round(cg*brightMul)},${Math.round(cb*brightMul)},${finalAlpha})`;
        cx.beginPath(); cx.arc(sx, sy, Math.max(0.3, r), 0, Math.PI*2); cx.fill();
      } else if(part.type === 'edge' && part.alive){
        // White-blue particles on active edges
        cx.fillStyle = `rgba(180,210,240,${finalAlpha})`;
        cx.beginPath(); cx.arc(sx, sy, Math.max(0.3, r), 0, Math.PI*2); cx.fill();
      } else {
        // Dim dust / dead edge particles
        cx.fillStyle = `rgba(100,110,140,${finalAlpha * 0.5})`;
        cx.beginPath(); cx.arc(sx, sy, Math.max(0.2, r*0.7), 0, Math.PI*2); cx.fill();
      }
    } else {
      // Cell node
      const {c, sx: psx, sy: psy, sz: psz, sc: psc} = item.data;
      const isHov = hovered === c;
      const isAlive = c.influential;

      if(isAlive){
        // SIZE diversification: amplitude drives radius (2x range)
        const baseR = 4 + c.amp * 20;
        const breath = Math.sin(t*0.012+c.id*0.7)*1.5;
        const r = baseR + breath;

        // TRANSPARENCY diversification: accuracy drives brightness
        const accMul = 0.4 + c.acc * 0.6;
        const [cr,cg,cb] = accRGB(c.acc);

        // Outer glow — large, soft, colored
        const glowR = r * (isHov ? 6 : 4);
        const glow = cx.createRadialGradient(psx,psy,r*0.2,psx,psy,glowR);
        glow.addColorStop(0, `rgba(${cr},${cg},${cb},${(isHov?0.4:0.25)*accMul})`);
        glow.addColorStop(0.3, `rgba(${cr},${cg},${cb},${(isHov?0.15:0.08)*accMul})`);
        glow.addColorStop(0.7, `rgba(${cr},${cg},${cb},${(isHov?0.04:0.02)*accMul})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        cx.fillStyle = glow;
        cx.beginPath(); cx.arc(psx,psy,glowR,0,Math.PI*2); cx.fill();

        // Core orb
        const coreGrad = cx.createRadialGradient(psx-r*0.25,psy-r*0.25,0,psx,psy,r);
        coreGrad.addColorStop(0, `rgba(${Math.min(255,cr+100)},${Math.min(255,cg+100)},${Math.min(255,cb+100)},${0.9*accMul})`);
        coreGrad.addColorStop(0.6, `rgba(${cr},${cg},${cb},${0.8*accMul})`);
        coreGrad.addColorStop(1, `rgba(${Math.round(cr*0.6)},${Math.round(cg*0.6)},${Math.round(cb*0.6)},${0.5*accMul})`);
        cx.fillStyle = coreGrad;
        cx.beginPath(); cx.arc(psx,psy,r,0,Math.PI*2); cx.fill();

        // Specular highlight
        const hl = cx.createRadialGradient(psx-r*0.35,psy-r*0.35,0,psx,psy,r*0.8);
        hl.addColorStop(0,'rgba(255,255,255,0.35)');
        hl.addColorStop(0.5,'rgba(255,255,255,0.08)');
        hl.addColorStop(1,'rgba(255,255,255,0)');
        cx.fillStyle = hl;
        cx.beginPath(); cx.arc(psx,psy,r,0,Math.PI*2); cx.fill();

        // Pulsing ring for >95% accuracy cells
        if(c.acc > 0.95){
          const ringAlpha = 0.2 + Math.sin(t*0.02+c.id)*0.15;
          cx.strokeStyle = `rgba(${cr},${cg},${cb},${ringAlpha})`;
          cx.lineWidth = 1.5;
          cx.beginPath(); cx.arc(psx,psy,r+4+Math.sin(t*0.015+c.id*0.3)*2,0,Math.PI*2); cx.stroke();
        }

        // Second subtle outer ring for very high amp
        if(c.amp > 0.95){
          cx.strokeStyle = `rgba(${cr},${cg},${cb},${0.06+Math.sin(t*0.01+c.id*0.5)*0.04})`;
          cx.lineWidth = 0.8;
          cx.beginPath(); cx.arc(psx,psy,r+10+Math.sin(t*0.008+c.id)*4,0,Math.PI*2); cx.stroke();
        }

        // Label on hover
        if(isHov){
          cx.font = '10px "SF Mono",monospace';
          cx.fillStyle = 'rgba(220,230,255,0.9)';
          cx.textAlign = 'center';
          cx.fillText(`${Math.round(c.acc*1000)}‰`, psx, psy - r - 8);
          cx.fillStyle = 'rgba(220,230,255,0.45)';
          cx.font = '9px "SF Mono",monospace';
          cx.fillText(c.fn, psx, psy - r - 20);
          cx.fillStyle = 'rgba(180,200,230,0.3)';
          cx.fillText(`amp ${c.amplitude_n}/${c.amplitude_d}`, psx, psy + r + 14);
        }
      } else {
        // Dead cell: tiny, very transparent
        const deadAlpha = 0.06 + c.acc * 0.08;
        const deadR = 1.5 + c.acc * 1.5;
        cx.fillStyle = isHov
          ? `rgba(80,90,120,${deadAlpha*3})`
          : `rgba(40,45,65,${deadAlpha})`;
        cx.beginPath(); cx.arc(psx,psy,deadR,0,Math.PI*2); cx.fill();

        if(isHov){
          cx.font = '9px "SF Mono",monospace';
          cx.fillStyle = 'rgba(160,170,200,0.5)';
          cx.textAlign = 'center';
          cx.fillText(`${Math.round(c.acc*1000)}‰`, psx, psy - deadR - 6);
          cx.fillText(c.fn, psx, psy - deadR - 16);
        }
      }
    }
  });

  // ---- Layer labels ----
  const labelPos = ringRadius + 1.6;
  for(let ti=0; ti<4; ti++){
    const [sx,sy] = project([labelPos, (ti-1.5)*layerSpacing, 0]);
    cx.font = '9px "SF Mono",monospace';
    cx.fillStyle = 'rgba(140,170,210,0.18)';
    cx.textAlign = 'left';
    cx.fillText(`thr=${thresholds[ti]}/16`, sx+8, sy+3);
  }

  // ---- Feature labels (top ring) ----
  for(let fi=0; fi<8; fi++){
    const angle = (fi/8)*Math.PI*2 - Math.PI/2;
    const lx = Math.cos(angle) * (ringRadius + 1.8);
    const lz = Math.sin(angle) * (ringRadius + 1.8);
    const [sx,sy] = project([lx, -1.5*layerSpacing - 1.0, lz]);
    const surviving = cells.filter(c => c.fr===fi && c.influential).length;
    cx.font = '8px "SF Mono",monospace';
    cx.textAlign = 'center';
    cx.fillStyle = surviving > 0 ? 'rgba(100,200,255,0.3)' : 'rgba(80,90,110,0.15)';
    cx.fillText(fn[tf[fi]], sx, sy);
    if(surviving > 0){
      cx.fillStyle = 'rgba(100,200,255,0.15)';
      cx.fillText(`${surviving}`, sx, sy + 11);
    }
  }

  // Panel
  if(hovered) showPanel(hovered);
  else document.getElementById('panel').classList.remove('visible');

  requestAnimationFrame(frame);
}

// Stats
const last = DATA.epochs[DATA.epochs.length-1];
const nA = cells.filter(c=>c.influential).length;
const ap = Math.round(last.accuracy_n*1000/last.accuracy_d);
document.getElementById('stats').innerHTML =
  `<span>${nA}</span>/64 surviving · accuracy <span>${ap}‰</span> · ${DATA.epochs.length} epochs · Wisconsin Breast Cancer (n=569)`;

frame();
</script>
