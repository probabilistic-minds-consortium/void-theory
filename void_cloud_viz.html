<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>VOID Cloud — Topology Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8c8d4;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 32px 20px 16px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 300;
    color: #e0e0f0;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .header .sub {
    font-size: 13px;
    color: #666680;
    margin-top: 6px;
    letter-spacing: 2px;
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 20px;
    background: #12121a;
    border: 1px solid #222238;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #888;
    transition: all 0.3s;
    font-family: inherit;
  }
  .tab:hover { border-color: #444466; color: #aaa; }
  .tab.active {
    background: #1a1a2e;
    border-color: #4a6fa5;
    color: #8ab4f8;
  }

  .main {
    display: flex;
    gap: 24px;
    padding: 16px 32px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
  }

  .viz-panel {
    flex: 1;
    min-width: 600px;
    position: relative;
  }
  canvas#cloud {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #1a1a2e;
    background: #08080e;
  }

  .info-panel {
    width: 340px;
    min-width: 300px;
  }

  .card {
    background: #0f0f18;
    border: 1px solid #1a1a2e;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #555570;
    margin-bottom: 14px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid #141420;
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { font-size: 12px; color: #777790; }
  .metric-value { font-size: 18px; font-weight: 600; }
  .metric-value.highlight { color: #8ab4f8; }
  .metric-value.green { color: #66bb6a; }
  .metric-value.red { color: #ef5350; }
  .metric-value.amber { color: #ffa726; }
  .metric-value.perfect { color: #ce93d8; }

  .bar-container {
    height: 6px;
    background: #1a1a2e;
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .bar-correct { background: #66bb6a; }
  .bar-wrong { background: #ef5350; }
  .bar-unknown { background: #555570; }

  .stacked-bar {
    display: flex;
    height: 10px;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 10px;
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #777;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .training-chart {
    width: 100%;
    height: 120px;
    margin-top: 8px;
  }

  .neuron-tooltip {
    position: absolute;
    background: #1a1a2e;
    border: 1px solid #333355;
    border-radius: 8px;
    padding: 12px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    min-width: 180px;
  }
  .neuron-tooltip.visible { opacity: 1; }
  .neuron-tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }
  .neuron-tooltip .tt-label { color: #666; }
  .neuron-tooltip .tt-val { color: #aab; font-weight: 600; }

  .dataset-desc {
    font-size: 12px;
    color: #666680;
    line-height: 1.6;
    margin-top: 4px;
  }

  @media (max-width: 1000px) {
    .main { flex-direction: column; padding: 16px; }
    .viz-panel { min-width: 300px; }
    .info-panel { width: 100%; }
  }
</style>
</head>

// ============================================================
// CANVAS DRAWING
// ============================================================
const canvas = document.getElementById('cloud');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// HiDPI
function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  return { w: rect.width, h: rect.height };
}

function neuronColor(n, ds) {
  if (n.is_output) return '#ce93d8';
  const ratio = n.correct / Math.max(1, n.correct + n.wrong);
  if (ratio > 0.7) {
    const g = Math.floor(130 + ratio * 100);
    return `rgb(80, ${g}, 100)`;
  } else if (ratio > 0.4) {
    return `rgb(180, 160, 80)`;
  } else {
    const r = Math.floor(180 + (1 - ratio) * 60);
    return `rgb(${r}, 80, 80)`;
  }
}

function neuronRadius(n) {
  if (n.is_output) return 12;
  const total = n.correct + n.wrong;
  return Math.max(3, Math.min(9, 3 + Math.sqrt(total) * 0.03));
}

function drawCloud(ds) {
  const { w, h } = setupCanvas();
  const pad = 50;
  const neurons = ds.neurons;

  // Map positions to canvas
  const posScale = DATA.model_info.POS_SCALE;
  const mapX = (x) => pad + (x / posScale) * (w - 2 * pad);
  const mapY = (y) => pad + (y / posScale) * (h - 2 * pad);

  // Build index
  const idxMap = {};
  neurons.forEach((n, i) => idxMap[n.id] = i);

  // Clear
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0, 0, w, h);

  // Draw grid (subtle)
  ctx.strokeStyle = '#111118';
  ctx.lineWidth = 0.5;
  for (let gx = 0; gx <= 10; gx++) {
    const x = pad + (gx / 10) * (w - 2 * pad);
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, h - pad); ctx.stroke();
  }
  for (let gy = 0; gy <= 10; gy++) {
    const y = pad + (gy / 10) * (h - 2 * pad);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke();
  }

  // Draw connections
  neurons.forEach(n => {
    const x1 = mapX(n.x), y1 = mapY(n.y);
    n.neighbors.forEach(nid => {
      if (nid in idxMap) {
        const nb = neurons[idxMap[nid]];
        const x2 = mapX(nb.x), y2 = mapY(nb.y);
        ctx.strokeStyle = n.is_output || nb.is_output ? 'rgba(206,147,216,0.15)' : 'rgba(100,120,180,0.07)';
        ctx.lineWidth = n.is_output || nb.is_output ? 1.2 : 0.6;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    });
  });

  // Draw neurons
  neurons.forEach(n => {
    const x = mapX(n.x), y = mapY(n.y);
    const r = neuronRadius(n);
    const col = neuronColor(n, ds);

    // Glow for output
    if (n.is_output) {
      const grad = ctx.createRadialGradient(x, y, r, x, y, r * 4);
      grad.addColorStop(0, 'rgba(206,147,216,0.25)');
      grad.addColorStop(1, 'rgba(206,147,216,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Neuron body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.strokeStyle = n.is_output ? '#ce93d8' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = n.is_output ? 2 : 0.5;
    ctx.stroke();

    // Feature count indicator (tiny inner ring)
    if (!n.is_output) {
      const frac = n.n_features / ds.n_features;
      ctx.strokeStyle = `rgba(138,180,248,${0.2 + frac * 0.4})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, r + 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
      ctx.stroke();
    }
  });

  // Output label
  const outN = neurons.find(n => n.is_output);
  if (outN) {
    ctx.fillStyle = '#ce93d8';
    ctx.font = '10px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('OUTPUT', mapX(outN.x), mapY(outN.y) - 18);
  }

  // Title
  ctx.fillStyle = '#444460';
  ctx.font = '11px "SF Mono", "Fira Code", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`${ds.n_neurons} neurons · k=${ds.k_neighbors} · t=${ds.n_ticks}`, pad, h - 16);

  // Store mapped positions for hover
  canvas._neurons = neurons.map(n => ({
    ...n,
    cx: mapX(n.x),
    cy: mapY(n.y),
    r: neuronRadius(n),
  }));
}

// ============================================================
// HOVER / TOOLTIP
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (!canvas._neurons) return;

  let hit = null;
  for (const n of canvas._neurons) {
    const dx = mx - n.cx, dy = my - n.cy;
    if (dx * dx + dy * dy < (n.r + 4) * (n.r + 4)) {
      hit = n;
      break;
    }
  }

  if (hit) {
    const total = hit.correct + hit.wrong;
    const acc = total > 0 ? ((hit.correct * 1000 / total) | 0) : 0;
    tooltip.innerHTML = `
      <div class="tt-row"><span class="tt-label">Neuron</span><span class="tt-val">#${hit.id}${hit.is_output ? ' (OUTPUT)' : ''}</span></div>
      <div class="tt-row"><span class="tt-label">Position</span><span class="tt-val">(${hit.x}, ${hit.y})</span></div>
      <div class="tt-row"><span class="tt-label">State</span><span class="tt-val">${hit.state}/${DATA.model_info.S_DENOM}</span></div>
      <div class="tt-row"><span class="tt-label">Features</span><span class="tt-val">${hit.n_features}/${datasets[currentIdx].n_features}</span></div>
      <div class="tt-row"><span class="tt-label">Correct / Wrong</span><span class="tt-val">${hit.correct} / ${hit.wrong}</span></div>
      <div class="tt-row"><span class="tt-label">Accuracy</span><span class="tt-val">${acc}\u2030</span></div>
      <div class="tt-row"><span class="tt-label">Amplitude</span><span class="tt-val">${hit.amplitude}/1000</span></div>
    `;
    tooltip.style.left = (e.clientX - canvas.parentElement.getBoundingClientRect().left + 16) + 'px';
    tooltip.style.top = (e.clientY - canvas.parentElement.getBoundingClientRect().top - 80) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.classList.remove('visible');
});

function renderCards(ds) {
  const m = ds.metrics;
  const total = m.correct + m.wrong + m.unknown;
  const caClass = m.cond_accuracy_permille >= 1000 ? 'perfect'
    : m.cond_accuracy_permille >= 980 ? 'green'
    : m.cond_accuracy_permille >= 950 ? 'highlight' : 'amber';

  // Dataset card
  document.getElementById('card-dataset').innerHTML = `
    <h3>Dataset</h3>
    <div class="metric-row">
      <span class="metric-label">Name</span>
      <span class="metric-value highlight">${ds.name}</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Samples</span>
      <span class="metric-value">${ds.n_samples}</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Features</span>
      <span class="metric-value">${ds.n_features}</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Classes</span>
      <span class="metric-value">${ds.class_names.join(' / ')}</span>
    </div>
  `;

  // Metrics card
  document.getElementById('card-metrics').innerHTML = `
    <h3>Performance</h3>
    <div class="metric-row">
      <span class="metric-label">Conditional Accuracy</span>
      <span class="metric-value ${caClass}">${m.cond_accuracy_permille}\u2030</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Coverage</span>
      <span class="metric-value">${m.coverage_pct}%</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Correct</span>
      <span class="metric-value green">${m.correct}</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Wrong</span>
      <span class="metric-value ${m.wrong === 0 ? 'perfect' : 'red'}">${m.wrong}</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Unknown</span>
      <span class="metric-value">${m.unknown}</span>
    </div>
  `;

  // Distribution bar
  const correctPct = (m.correct / total * 100).toFixed(1);
  const wrongPct = (m.wrong / total * 100).toFixed(1);
  const unknownPct = (m.unknown / total * 100).toFixed(1);

  document.getElementById('card-distribution').innerHTML = `
    <h3>Verdict Distribution</h3>
    <div class="stacked-bar">
      <div style="width:${correctPct}%; background:#66bb6a;"></div>
      <div style="width:${wrongPct}%; background:#ef5350;"></div>
      <div style="width:${unknownPct}%; background:#555570;"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div>Correct ${correctPct}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>Wrong ${wrongPct}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#555570"></div>Unknown ${unknownPct}%</div>
    </div>
  `;

  // Training history mini-chart
  renderTrainingChart(ds);
}

function renderTrainingChart(ds) {
  const hist = ds.training_history;
  const container = document.getElementById('card-training');
  container.innerHTML = `<h3>Training Progress</h3><canvas class="training-chart" id="trainChart"></canvas>`;

  const tc = document.getElementById('trainChart');
  const dpr = window.devicePixelRatio || 1;
  const rect = tc.getBoundingClientRect();
  tc.width = rect.width * dpr;
  tc.height = rect.height * dpr;
  const tctx = tc.getContext('2d');
  tctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const pad = { l: 36, r: 12, t: 12, b: 24 };
  const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;

  const total = ds.n_samples;
  const maxEpoch = Math.max(...hist.map(h => h.epoch));

  // Background
  tctx.fillStyle = '#08080e';
  tctx.fillRect(0, 0, w, h);

  // Axes
  tctx.strokeStyle = '#1a1a2e';
  tctx.lineWidth = 1;
  tctx.beginPath();
  tctx.moveTo(pad.l, pad.t);
  tctx.lineTo(pad.l, h - pad.b);
  tctx.lineTo(w - pad.r, h - pad.b);
  tctx.stroke();

  // Y labels
  tctx.fillStyle = '#444';
  tctx.font = '9px monospace';
  tctx.textAlign = 'right';
  for (let yv = 0; yv <= total; yv += Math.ceil(total / 4)) {
    const yy = h - pad.b - (yv / total) * ph;
    tctx.fillText(yv, pad.l - 4, yy + 3);
    tctx.strokeStyle = '#111118';
    tctx.beginPath(); tctx.moveTo(pad.l, yy); tctx.lineTo(w - pad.r, yy); tctx.stroke();
  }

  // Plot lines
  function plotLine(key, color) {
    tctx.strokeStyle = color;
    tctx.lineWidth = 1.5;
    tctx.beginPath();
    hist.forEach((h, i) => {
      const x = pad.l + (h.epoch / maxEpoch) * pw;
      const y = (h - pad.b) - (h[key] / total) * ph;
      // fix: h is the history point, not canvas h
      const yy = rect.height - pad.b - (h[key] / total) * ph;
      if (i === 0) tctx.moveTo(x, yy);
      else tctx.lineTo(x, yy);
    });
    tctx.stroke();
  }

  // Correct (green)
  tctx.strokeStyle = '#66bb6a';
  tctx.lineWidth = 2;
  tctx.beginPath();
  hist.forEach((pt, i) => {
    const x = pad.l + (pt.epoch / maxEpoch) * pw;
    const yy = h - pad.b - (pt.correct / total) * ph;
    if (i === 0) tctx.moveTo(x, yy); else tctx.lineTo(x, yy);
  });
  tctx.stroke();

  // Wrong (red)
  tctx.strokeStyle = '#ef5350';
  tctx.lineWidth = 1.5;
  tctx.beginPath();
  hist.forEach((pt, i) => {
    const x = pad.l + (pt.epoch / maxEpoch) * pw;
    const yy = h - pad.b - (pt.wrong / total) * ph;
    if (i === 0) tctx.moveTo(x, yy); else tctx.lineTo(x, yy);
  });
  tctx.stroke();

  // Unknown (grey)
  tctx.strokeStyle = '#555570';
  tctx.lineWidth = 1;
  tctx.setLineDash([4, 3]);
  tctx.beginPath();
  hist.forEach((pt, i) => {
    const x = pad.l + (pt.epoch / maxEpoch) * pw;
    const yy = h - pad.b - (pt.unknown / total) * ph;
    if (i === 0) tctx.moveTo(x, yy); else tctx.lineTo(x, yy);
  });
  tctx.stroke();
  tctx.setLineDash([]);

  // Epoch label
  tctx.fillStyle = '#444';
  tctx.textAlign = 'center';
  tctx.fillText('epoch', w / 2, h - 4);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const ds = datasets[currentIdx];
  drawCloud(ds);
  renderCards(ds);
}

// Resize handler
window.addEventListener('resize', () => render());

// Initial render
render();
</script>
