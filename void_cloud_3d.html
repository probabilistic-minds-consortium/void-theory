function mkTex(sz,profile){
  const c=document.createElement('canvas');c.width=c.height=sz;
  const x=c.getContext('2d'),g=x.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  profile.forEach(s=>g.addColorStop(s[0],s[1]));
  x.fillStyle=g;x.fillRect(0,0,sz,sz);return new THREE.CanvasTexture(c);
}
const glowTex=mkTex(256,[
  [0,'rgba(255,255,255,0.5)'],[0.1,'rgba(255,255,255,0.2)'],

]);

  [0,'rgba(255,255,255,0.9)'],[0.3,'rgba(255,255,255,0.2)'],

]);

// Normalize positions: center at origin, scale to ~[-200,200]
function normPos(neurons){
  let mx=0,my=0,mz=0;
  neurons.forEach(n=>{mx+=n.x;my+=n.y;mz+=n.z});
  mx/=neurons.length;my/=neurons.length;mz/=neurons.length;
  let maxD=1;
  neurons.forEach(n=>{
    const d=Math.max(Math.abs(n.x-mx),Math.abs(n.y-my),Math.abs(n.z-mz));
    if(d>maxD)maxD=d;
  });
  const scale=220/maxD;
  return neurons.map(n=>({
    ...n,
    nx:(n.x-mx)*scale,
    ny:(n.y-my)*scale,
    nz:(n.z-mz)*scale
  }));
}

// Color by position gradient (cool left → warm right)
function posCol(n,ns){
  let minX=Infinity,maxX=-Infinity;
  ns.forEach(nn=>{if(nn.nx<minX)minX=nn.nx;if(nn.nx>maxX)maxX=nn.nx});
  const t=(n.nx-minX)/(maxX-minX+1);
  if(n.is_output) return new THREE.Color(0.75,0.6,0.85);
  return new THREE.Color(0.7+t*0.3, 0.8-t*0.45, 0.85-t*0.55);
}

function accMul(n){
  const t=n.correct+n.wrong;
  return t===0?0.4:0.5+0.5*(n.correct/t);
}

// Neuron radius: based on accuracy, NOT on is_output
function nRad(n){
  const t=n.correct+n.wrong;
  const acc=t>0?n.correct/t:0.5;
  const base=5+acc*5; // 5..10
  // Output only slightly larger
  return n.is_output?base+3:base;
}

function buildScene(ds){
  while(grp.children.length)grp.remove(grp.children[0]);
  nMeshes=[];gSprites=[];

  const ns=normPos(ds.neurons);
  // Store normalized positions for signal animation
  ds._ns=ns;
  const idx={};ns.forEach((n,i)=>idx[n.id]=i);

  // --- FILAMENT THREADS between neurons ---
  // Dense particle streams along curved paths
  const fp=[],fc=[];
  const GRAN=80; // granules per thread

  ns.forEach(n=>{
    n.neighbors.forEach(nid=>{
      if(!(nid in idx)||nid<=n.id)return;
      const nb=ns[idx[nid]];
      const c1=posCol(n,ns),c2=posCol(nb,ns);

      // Bezier control point (offset from midpoint for curvature)
      const cpx=(n.nx+nb.nx)/2+(Math.random()-0.5)*50;
      const cpy=(n.ny+nb.ny)/2+(Math.random()-0.5)*50;
      const cpz=(n.nz+nb.nz)/2+(Math.random()-0.5)*50;

      // Distance between neurons
      const dx=nb.nx-n.nx,dy=nb.ny-n.ny,dz=nb.nz-n.nz;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      // More granules for longer threads
      const count=Math.max(40,Math.floor(GRAN*dist/200));
      // Thread width (thin filament)
      const spread=2+dist*0.015;

      for(let i=0;i<count;i++){
        const t=Math.random();
        const u=1-t;
        // Quadratic bezier
        let px=u*u*n.nx+2*u*t*cpx+t*t*nb.nx;
        let py=u*u*n.ny+2*u*t*cpy+t*t*nb.ny;
        let pz=u*u*n.nz+2*u*t*cpz+t*t*nb.nz;
        // Spread perpendicular (thin thread)
        px+=(Math.random()-0.5)*spread;
        py+=(Math.random()-0.5)*spread;
        pz+=(Math.random()-0.5)*spread;
        fp.push(px,py,pz);
        const c=c1.clone().lerp(c2,t);
        const b=0.35+Math.random()*0.15;
        fc.push(c.r*b,c.g*b,c.b*b);
      }
    });
  });

  if(fp.length){
    const sg=new THREE.BufferGeometry();
    sg.setAttribute('position',new THREE.Float32BufferAttribute(fp,3));
    sg.setAttribute('color',new THREE.Float32BufferAttribute(fc,3));
    grp.add(new THREE.Points(sg,new THREE.PointsMaterial({
      size:1.8,map:partTex,vertexColors:true,transparent:true,opacity:0.75,
      blending:THREE.AdditiveBlending,depthWrite:false
    })));
  }

  // --- Ambient dust (sparse) ---
  const dN=200,dp=new Float32Array(dN*3),dc=new Float32Array(dN*3);
  for(let i=0;i<dN;i++){
    dp[i*3]=(Math.random()-0.5)*600;dp[i*3+1]=(Math.random()-0.5)*600;dp[i*3+2]=(Math.random()-0.5)*600;
    const b=0.04+Math.random()*0.04;dc[i*3]=b;dc[i*3+1]=b;dc[i*3+2]=b*1.1;
  }
  const dg=new THREE.BufferGeometry();
  dg.setAttribute('position',new THREE.Float32BufferAttribute(dp,3));
  dg.setAttribute('color',new THREE.Float32BufferAttribute(dc,3));
  grp.add(new THREE.Points(dg,new THREE.PointsMaterial({size:1.2,vertexColors:true,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false})));

  // --- Neuron spheres ---
  ns.forEach(n=>{
    const col=posCol(n,ns);
    const bri=accMul(n);
    const r=nRad(n);

    const mat=new THREE.MeshPhongMaterial({
      color:col.clone().multiplyScalar(bri),
      emissive:col.clone().multiplyScalar(0.2*bri),
      specular:new THREE.Color(0.35,0.35,0.45),
      shininess:100,transparent:true,opacity:0.93
    });
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r,20,14),mat);
    mesh.position.set(n.nx,n.ny,n.nz);
    mesh.userData=n;
    grp.add(mesh);nMeshes.push(mesh);

    // Glow — proportional to neuron size, NOT giant for output
    const gs=r*6+10;
    const sm=new THREE.SpriteMaterial({
      map:glowTex,color:col.clone().multiplyScalar(1.1),transparent:true,
      opacity:0.12+bri*0.08,
      blending:THREE.AdditiveBlending,depthWrite:false
    });
    const spr=new THREE.Sprite(sm);
    spr.position.copy(mesh.position);spr.scale.setScalar(gs);
    spr.userData={bOp:sm.opacity,bSc:gs};
    grp.add(spr);gSprites.push(spr);
  });

  // --- Labels for notable neurons ---
  ns.forEach(n=>{
    const tot=n.correct+n.wrong;
    if(!n.is_output&&tot<3000)return;
    const col=posCol(n,ns);
    const r=nRad(n);
    const lc=document.createElement('canvas');lc.width=200;lc.height=28;
    const lx=lc.getContext('2d');
    lx.font='bold 10px "SF Mono","Fira Code",monospace';
    lx.fillStyle=`rgba(${Math.floor(col.r*220)},${Math.floor(col.g*220)},${Math.floor(col.b*220)},0.55)`;
    const acc=tot>0?((n.correct*1000/tot)|0):0;
    lx.fillText(n.is_output?`OUTPUT ${acc}\u2030`:`#${n.id} ${acc}\u2030`,2,12);
    const lt=new THREE.CanvasTexture(lc);
    const ls=new THREE.Sprite(new THREE.SpriteMaterial({map:lt,transparent:true,opacity:0.6,depthWrite:false}));
    ls.position.set(n.nx,n.ny+r+12,n.nz);
    ls.scale.set(55,8,1);
    grp.add(ls);
  });
}

function advT(){
  const s=DS[ci].signal_propagation[aSamp];
  aTick=(aTick+1)%s.ticks.length;
  const st=s.ticks[aTick],S=DATA.model_info.S_DENOM;
  const ns=DS[ci]._ns||DS[ci].neurons;
  nMeshes.forEach((m,i)=>{
    const n=m.userData,state=st[i],dev=(state-S/2)/(S/2);
    let col;
    if(n.is_output){
      col=state>DATA.model_info.FOR_THRESH?new THREE.Color(0.3,0.9,0.45):state<DATA.model_info.AG_THRESH?new THREE.Color(0.9,0.3,0.3):new THREE.Color(0.45,0.45,0.55);
    }else{
      const I=Math.abs(dev);
      col=dev>0?new THREE.Color(0.5+I*0.45,0.65+I*0.3,0.75+I*0.25):new THREE.Color(0.75+I*0.25,0.35+I*0.2,0.3+I*0.15);
    }
    m.material.color.copy(col);m.material.emissive.copy(col).multiplyScalar(Math.abs(dev)*0.45);
    const g=gSprites[i];
    if(g){g.material.color.copy(col).multiplyScalar(1.2);g.material.opacity=g.userData.bOp*(1+Math.abs(dev)*2.5);g.scale.setScalar(g.userData.bSc*(1+Math.abs(dev)*0.5))}
  });
}
function clrSig(){
  anim=false;aTick=-1;
  const ns=DS[ci]._ns||DS[ci].neurons;
  nMeshes.forEach((m,i)=>{
    const n=m.userData,col=posCol(n,ns),b=accMul(n);
    m.material.color.copy(col).multiplyScalar(b);m.material.emissive.copy(col).multiplyScalar(0.2*b);
    const g=gSprites[i];if(g){g.material.color.copy(col).multiplyScalar(1.1);g.material.opacity=g.userData.bOp;g.scale.setScalar(g.userData.bSc)}
  });
  document.getElementById('si').textContent='propagation';
}

  const b=document.createElement('button');b.className='tab'+(i===0?' active':'');
  b.innerHTML=`${d.name} <span style="opacity:.3;font-size:7px">${d.n_neurons}n</span>`;
  b.onclick=()=>{ci=i;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));clrSig();buildScene(DS[i]);rM(DS[i]);rSB(DS[i])};
  te.appendChild(b);
});
function rM(d){
  const m=d.metrics,cc=m.cond_accuracy_permille>=1000?'p':m.cond_accuracy_permille>=980?'g':'';
  document.getElementById('info').innerHTML=`<h3>${d.name}</h3>
    <div class="mr"><span class="ml">neurons</span><span class="mv">${d.n_neurons} · k=${d.k_neighbors}</span></div>
    <div class="mr"><span class="ml">samples</span><span class="mv">${d.n_samples} × ${d.n_features}f</span></div>
    <div class="mr"><span class="ml">accuracy</span><span class="mv ${cc}">${m.cond_accuracy_permille}\u2030</span></div>
    <div class="mr"><span class="ml">coverage</span><span class="mv">${m.coverage_pct}%</span></div>
    <div class="mr"><span class="ml">correct / wrong</span><span class="mv"><span class="g">${m.correct}</span> / <span class="${m.wrong===0?'p':'r'}">${m.wrong}</span></span></div>`;
}
function rSB(d){
  const c=document.getElementById('sbs');c.innerHTML='';
  d.signal_propagation.forEach((s,i)=>{const b=document.createElement('button');b.className='sb';b.textContent=s.label;b.onclick=()=>{c.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));b.classList.add('on');startSig(i)};c.appendChild(b)});
  const x=document.createElement('button');x.className='sb';x.textContent='×';x.style.color='rgba(180,90,90,.5)';
  x.onclick=()=>{c.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));clrSig()};c.appendChild(x);
}

let time=0;
function animate(){
  requestAnimationFrame(animate);time+=0.0015;
  if(!drag){sp.t+=0.0004;uc()}
  if(anim){sTimer+=0.016;if(sTimer>1.3){sTimer=0;advT()}}
  gSprites.forEach((s,i)=>{
    if(!anim){
      s.scale.setScalar(s.userData.bSc*(1+Math.sin(time*1.2+i*0.8)*0.12));
      s.material.opacity=s.userData.bOp*(0.8+Math.sin(time*1.5+i*0.6)*0.2);
    }
  });
  ren.render(scene,cam);
}
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

buildScene(DS[0]);rM(DS[0]);rSB(DS[0]);animate();
</script>
</body>
</html>
